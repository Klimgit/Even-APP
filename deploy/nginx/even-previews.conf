# /etc/nginx/sites-enabled/even-previews.conf
# Path-based branch previews. Production on :8080 is unchanged.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    include /opt/even-app-previews/nginx/enabled/*.conf;

    location / {
        return 404;
    }
}
