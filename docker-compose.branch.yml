# Per-branch preview overrides. Requires env:
#   COMPOSE_PROJECT_NAME=even-prev-<slug>
#   PREVIEW_GATEWAY_PORT, PREVIEW_MINIO_PORT (localhost bind)

services:
  postgres:
    restart: unless-stopped
    ports: []

  minio:
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PREVIEW_MINIO_PORT}:9000"

  auth:
    restart: unless-stopped
    ports: []

  lexicon:
    restart: unless-stopped
    ports: []

  content:
    restart: unless-stopped
    ports: []

  learning:
    restart: unless-stopped
    ports: []

  api-gateway:
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PREVIEW_GATEWAY_PORT}:8080"
