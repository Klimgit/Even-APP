name: even-app

x-service-env: &service-env
  LOG_LEVEL: ${LOG_LEVEL:-info}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-even}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-even}
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-even}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123}
      S3_BUCKET: ${S3_BUCKET:-even-media}
    volumes:
      - ./deploy/minio/init-bucket.sh:/init-bucket.sh:ro
    entrypoint: ["/bin/sh", "/init-bucket.sh"]
    restart: "no"

  auth-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./services/auth/database/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-even}:${POSTGRES_PASSWORD:-even}@postgres:5432/even_auth?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  lexicon-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./services/lexicon/database/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-even}:${POSTGRES_PASSWORD:-even}@postgres:5432/even_lexicon?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  content-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./services/content/database/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-even}:${POSTGRES_PASSWORD:-even}@postgres:5432/even_content?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  learning-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./services/learning/database/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://${POSTGRES_USER:-even}:${POSTGRES_PASSWORD:-even}@postgres:5432/even_learning?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  auth:
    build:
      context: .
      dockerfile: services/auth/docker/Dockerfile
    environment:
      <<: *service-env
      HTTP_PORT: 8081
      DATABASE_URL: postgres://${POSTGRES_USER:-even}:${POSTGRES_PASSWORD:-even}@postgres:5432/even_auth?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
    ports:
      - "8081:8081"
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  lexicon:
    build:
      context: .
      dockerfile: services/lexicon/docker/Dockerfile
    environment:
      <<: *service-env
      HTTP_PORT: 8082
      DATABASE_URL: postgres://${POSTGRES_USER:-even}:${POSTGRES_PASSWORD:-even}@postgres:5432/even_lexicon?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      MEDIA_USER_QUOTA_BYTES: ${MEDIA_USER_QUOTA_BYTES:-524288000}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-even-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123}
    ports:
      - "8082:8082"
    depends_on:
      lexicon-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  content:
    build:
      context: .
      dockerfile: services/content/docker/Dockerfile
    environment:
      <<: *service-env
      HTTP_PORT: 8083
      DATABASE_URL: postgres://${POSTGRES_USER:-even}:${POSTGRES_PASSWORD:-even}@postgres:5432/even_content?sslmode=disable
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_BUCKET: ${S3_BUCKET:-even-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minio}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minio123}
    ports:
      - "8083:8083"
    depends_on:
      content-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  learning:
    build:
      context: .
      dockerfile: services/learning/docker/Dockerfile
    environment:
      <<: *service-env
      HTTP_PORT: 8084
      DATABASE_URL: postgres://${POSTGRES_USER:-even}:${POSTGRES_PASSWORD:-even}@postgres:5432/even_learning?sslmode=disable
    ports:
      - "8084:8084"
    depends_on:
      learning-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/docker/Dockerfile
    environment:
      <<: *service-env
      HTTP_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-dev-change-me}
      AUTH_URL: http://auth:8081
      LEXICON_URL: http://lexicon:8082
      CONTENT_URL: http://content:8083
      LEARNING_URL: http://learning:8084
    ports:
      - "8080:8080"
    depends_on:
      auth:
        condition: service_healthy
      lexicon:
        condition: service_healthy
      content:
        condition: service_healthy
      learning:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  minio_data:
