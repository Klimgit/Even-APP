openapi: 3.0.3
info:
  title: even-auth
  version: 0.2.0
  description: Authentication and user management

paths:
  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth, Public]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth, Public]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/auth/refresh:
    post:
      operationId: refresh
      tags: [Auth, Public]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokensResponse"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/auth/me:
    get:
      operationId: getMe
      tags: [Auth]
      summary: Current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/auth/demo/public:
    get:
      operationId: demoPublic
      tags: [Auth, Public, Demo]
      summary: Public demo — aggregate user count from DB
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoPublicResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/auth/demo/me:
    get:
      operationId: demoMe
      tags: [Auth, Demo]
      summary: JWT demo — profile from DB plus token claims
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoMeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/auth/demo/teacher:
    get:
      operationId: demoTeacher
      tags: [Auth, Demo]
      summary: Teacher-only demo — role check plus DB lookup
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoTeacherResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Teacher role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/auth/demo/admin/stats:
    get:
      operationId: demoAdminStats
      tags: [Auth, Demo]
      summary: Admin-only demo — user statistics from DB
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoAdminStatsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Platform admin required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        display_name:
          type: string
        role:
          type: string
          enum: [student, teacher]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthResponse:
      type: object
      required: [access_token, refresh_token, user]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    TokensResponse:
      type: object
      required: [access_token, refresh_token]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string

    User:
      type: object
      required: [id, email, role, is_admin, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        display_name:
          type: string
        role:
          type: string
          enum: [student, teacher]
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        error:
          type: string

    DemoPublicResponse:
      type: object
      required: [message, user_count]
      properties:
        message:
          type: string
        user_count:
          type: integer
          format: int32

    DemoMeResponse:
      type: object
      required: [user, token_role, token_is_admin]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token_role:
          type: string
          enum: [student, teacher]
        token_is_admin:
          type: boolean

    DemoTeacherResponse:
      type: object
      required: [message, role, display_name]
      properties:
        message:
          type: string
        role:
          type: string
          enum: [student, teacher]
        display_name:
          type: string

    DemoAdminStatsResponse:
      type: object
      required: [total_users, students, teachers, admins]
      properties:
        total_users:
          type: integer
          format: int32
        students:
          type: integer
          format: int32
        teachers:
          type: integer
          format: int32
        admins:
          type: integer
          format: int32
