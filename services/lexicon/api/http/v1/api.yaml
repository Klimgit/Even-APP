openapi: 3.0.3
info:
  title: even-lexicon
  version: 0.2.0
  description: Languages, lexicon, and vocabulary (media lives in the media service)

paths:
  /languages:
    get:
      operationId: listLanguages
      tags: [Public]
      summary: List active languages
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Language"
        default:
          $ref: "#/components/responses/DefaultError"

  /languages/{code}:
    get:
      operationId: getLanguage
      tags: [Public]
      summary: Get language by code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Language"
        "404":
          description: Language not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /languages/{code}/alphabet:
    get:
      operationId: getLanguageAlphabet
      tags: [Public]
      summary: Get alphabet letters for keyboard
      parameters:
        - name: code
          in: path
          required: true
          schema:
