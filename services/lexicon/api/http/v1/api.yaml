components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    Language:
      type: object
      required: [id, code, name, native_name, direction, is_active]
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        native_name:
          type: string
        direction:
          type: string
          enum: [ltr, rtl]
        is_active:
          type: boolean

    CreateLanguageRequest:
      type: object
      required: [code, name, native_name]
      properties:
        code:
          type: string
        name:
          type: string
        native_name:
          type: string
        direction:
          type: string
          enum: [ltr, rtl]

    PatchLanguageRequest:
      type: object
      properties:
        name:
          type: string
        native_name:
          type: string
        direction:
          type: string
          enum: [ltr, rtl]
        is_active:
          type: boolean

    AlphabetLetter:
      type: object
      required: [id, language_id, character, sort_order]
      properties:
        id:
          type: string
          format: uuid
        language_id:
          type: string
          format: uuid
        character:
          type: string
          minLength: 1
          maxLength: 32
          description: Single Unicode letter for the keyboard (e.g. Even ӈ U+04A9, not ASCII-only).
          example: "ӈ"
        upper_char:
          type: string
          maxLength: 32
          description: Optional uppercase counterpart (e.g. Ӈ U+04A7).
          example: "Ӈ"
        sort_order:
          type: integer
        label:
          type: string
          description: Optional short UI hint for the key (e.g. key name).
        transcription:
          type: string
          maxLength: 64
          description: IPA phonetic transcription shown near the keyboard key (e.g. ŋ for ӈ).
          example: "ŋ"

    CreateAlphabetLetterRequest:
      type: object
      required: [character, sort_order]
      properties:
        character:
          type: string
          minLength: 1
          maxLength: 32
          description: Unicode letter shown on the custom keyboard.
          example: "ӈ"
        upper_char:
          type: string
          maxLength: 32
          example: "Ӈ"
        sort_order:
          type: integer
        label:
          type: string
        transcription:
          type: string
          maxLength: 64
          example: "ŋ"

    PatchAlphabetLetterRequest:
      type: object
      properties:
        character:
          type: string
          minLength: 1
          maxLength: 32
        upper_char:
          type: string
          maxLength: 32
        sort_order:
          type: integer
        label:
          type: string
        transcription:
          type: string
          maxLength: 64

    ReorderAlphabetRequest:
      type: object
      required: [letter_ids]
      properties:
        letter_ids:
          type: array
          items:
            type: string
            format: uuid

    Sound:
      type: object
      required: [id, language_id]
      properties:
        id:
          type: string
          format: uuid
        language_id:
          type: string
          format: uuid
        ipa:
          type: string
        description:
          type: string
        audio_url:
          type: string

    CreateSoundRequest:
      type: object
      properties:
        ipa:
          type: string
        description:
          type: string
        audio_key:
          type: string

    PatchSoundRequest:
      type: object
      properties:
        ipa:
          type: string
        description:
          type: string
        audio_key:
          type: string

    LinkSoundRequest:
      type: object
      required: [sound_id]
      properties:
        sound_id:
          type: string
          format: uuid

    Lexeme:
      type: object
      required: [id, language_id, lemma, translations, forms, media]
      properties:
        id:
          type: string
          format: uuid
        language_id:
          type: string
          format: uuid
        lemma:
          type: string
        part_of_speech:
          type: string
        notes:
          type: string
        translations:
          type: array
          items:
            $ref: "#/components/schemas/LexemeTranslation"
        forms:
          type: array
          items:
            $ref: "#/components/schemas/LexemeForm"
        media:
          type: array
          items:
            $ref: "#/components/schemas/LexemeMedia"
        primary_image_url:
          type: string
        primary_audio_url:
          type: string

    LexemeForm:
      type: object
      required: [id, lexeme_id, form]
      properties:
        id:
          type: string
          format: uuid
        lexeme_id:
          type: string
          format: uuid
        form:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string

    LexemeTranslation:
      type: object
      required: [id, target_language_id, text]
      properties:
        id:
          type: string
          format: uuid
        target_language_id:
          type: string
          format: uuid
        text:
          type: string
        target_lexeme_id:
          type: string
          format: uuid

    LexemeMedia:
      type: object
      required: [id, kind, is_primary, url]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [image, audio_word, audio_sentence, audio_form, video]
        label:
          type: string
        is_primary:
          type: boolean
        url:
          type: string
        form_id:
          type: string
          format: uuid

    CreateLexemeRequest:
      type: object
      required: [lemma]
      properties:
        lemma:
          type: string
        part_of_speech:
          type: string
        notes:
          type: string
        translations:
          type: array
          items:
            $ref: "#/components/schemas/CreateLexemeTranslationInput"

    CreateLexemeTranslationInput:
      type: object
      required: [target_language_id, text]
      properties:
        target_language_id:
          type: string
          format: uuid
        text:
          type: string

    PatchLexemeRequest:
      type: object
      properties:
        lemma:
          type: string
        part_of_speech:
          type: string
        notes:
          type: string

    CreateLexemeFormRequest:
      type: object
      required: [form]
      properties:
        form:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string

    PatchLexemeFormRequest:
      type: object
      properties:
        form:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string

    CreateLexemeTranslationRequest:
      type: object
      required: [target_language_id, text]
      properties:
        target_language_id:
          type: string
          format: uuid
        text:
          type: string
        target_lexeme_id:
          type: string
          format: uuid

    CreateLexemeMediaRequest:
      type: object
      required: [media_asset_id, kind]
      properties:
        media_asset_id:
          type: string
          format: uuid
        kind:
          type: string
          enum: [image, audio_word, audio_sentence, audio_form, video]
        label:
          type: string
        is_primary:
          type: boolean
        form_id:
          type: string
          format: uuid

    LexemeListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Lexeme"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
