openapi: 3.0.3
info:
  title: even-lexicon
  version: 0.2.0
  description: Languages, lexicon, and platform media library

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      tags: [System, Public]
      summary: Health check
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/platform/media/presign:
    post:
      operationId: platformMediaPresign
      tags: [PlatformMedia]
      summary: Presign upload URL (platform admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "403":
          description: Platform admin required

  /api/v1/platform/media/confirm:
    post:
      operationId: platformMediaConfirm
      tags: [PlatformMedia]
      summary: Confirm uploaded media (platform admin)
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Created

  /api/v1/platform/languages/{code}/media:
    get:
      operationId: listPlatformMedia
      tags: [PlatformMedia]
      summary: List platform media library for a language (platform admin)
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK

  /api/v1/platform/media/{id}:
    get:
      operationId: getPlatformMedia
      tags: [PlatformMedia]
      summary: Get media asset by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
    patch:
      operationId: patchPlatformMedia
      tags: [PlatformMedia]
      summary: Update media metadata (platform admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
    delete:
      operationId: deletePlatformMedia
      tags: [PlatformMedia]
      summary: Delete media asset (platform admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No content

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
        service:
          type: string
