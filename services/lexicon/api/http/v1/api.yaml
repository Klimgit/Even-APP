openapi: 3.0.3
info:
  title: even-lexicon
  version: 0.2.0
  description: Languages, lexicon, and platform media library

paths:
  /api/v1/platform/media/presign:
    post:
      operationId: platformMediaPresign
      tags: [PlatformMedia]
      summary: Presign upload URL (platform admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PresignRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PresignResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Platform admin required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/platform/media/confirm:
    post:
      operationId: platformMediaConfirm
      tags: [PlatformMedia]
      summary: Confirm uploaded media (platform admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/platform/languages/{code}/media:
    get:
      operationId: listPlatformMedia
      tags: [PlatformMedia]
      summary: List platform media library for a language
      security:
        - bearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: q
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "404":
          description: Language not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

  /api/v1/platform/media/{id}:
    get:
      operationId: getPlatformMedia
      tags: [PlatformMedia]
      summary: Get media asset by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Media expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"
    patch:
      operationId: patchPlatformMedia
      tags: [PlatformMedia]
      summary: Update media metadata (platform admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMediaRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Platform admin required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"
    delete:
      operationId: deletePlatformMedia
      tags: [PlatformMedia]
      summary: Delete media asset (platform admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No content
        "400":
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Platform admin required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/DefaultError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    DefaultError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    PresignRequest:
      type: object
      required: [filename, mime_type, size_bytes, language_id]
      properties:
        filename:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        language_id:
          type: string
          format: uuid

    PresignResponse:
      type: object
      required: [upload_url, object_key, media_asset_id]
      properties:
        upload_url:
          type: string
        object_key:
          type: string
        media_asset_id:
          type: string
          format: uuid

    ConfirmRequest:
      type: object
      required: [object_key, mime_type, size_bytes, language_id]
      properties:
        object_key:
          type: string
        mime_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        language_id:
          type: string
          format: uuid
        display_name:
          type: string
        linked_lexeme_id:
          type: string
          format: uuid
        ttl_seconds:
          type: integer
          format: int64
        expires_at:
          type: string
          format: date-time
        width:
          type: integer
        height:
          type: integer
        duration_ms:
          type: integer

    PatchMediaRequest:
      type: object
      properties:
        display_name:
          type: string
        linked_lexeme_id:
          type: string
          format: uuid
        ttl_seconds:
          type: integer
          format: int64
        expires_at:
          type: string
          format: date-time

    MediaAsset:
      type: object
      required: [id, scope, language_id, display_name, mime_type, media_kind, url, size_bytes, created_at]
      properties:
        id:
          type: string
          format: uuid
        scope:
          type: string
        language_id:
          type: string
          format: uuid
        display_name:
          type: string
        mime_type:
          type: string
        media_kind:
          type: string
        url:
          type: string
        size_bytes:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        linked_lexeme_id:
          type: string
          format: uuid
        width:
          type: integer
        height:
          type: integer
        duration_ms:
          type: integer
        expires_at:
          type: string
          format: date-time

    MediaListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        error:
          type: string
